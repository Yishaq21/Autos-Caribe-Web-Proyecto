<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <h4><i class="fa-solid fa-car"></i> Autos Caribe - Login</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <!-- Alertas de éxito o error -->
                        <div th:if="${error}" class="alert alert-danger text-center">[[${error}]]</div>
                        <div th:if="${todoOk}" class="alert alert-success text-center">[[${todoOk}]]</div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Usuario</label>
                                <input type="text" class="form-control" id="username" name="username" required="true" placeholder="Ingresa tu usuario">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" name="password" required="true" placeholder="Ingresa tu contraseña">
                            </div>
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <span>¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
