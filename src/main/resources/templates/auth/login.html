<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Autos Caribe</title>
    <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">Bienvenido de nuevo</h4>
                </div>
                <div class="card-body">

                    <div th:if="${todoOk}" class="alert alert-success" th:text="${todoOk}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Iniciar Sesión</button>
                    </form>

                    <p class="mt-3 text-center">
                        ¿No tienes una cuenta? <a th:href="@{/registro/nuevo}">Registrarse</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
