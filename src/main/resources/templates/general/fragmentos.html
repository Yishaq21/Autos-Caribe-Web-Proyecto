<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <!-- Fragmento del Head-->
    <head th:fragment="head">
        <title>Autos Caribe</title>
        <meta charset="UTF-8"/>
        <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>

        <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
        <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
        <script th:src="@{/js/rutinas.js}"></script>
    </head>

    <body>
        <!-- Fragmento Barra de Navegación -->
        <header th:fragment="header">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
                <div class="container-fluid">
                    <a class="navbar-brand" th:href="@{/}">
                        <i class="fa-solid fa-car"></i> Autos Caribe
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item" th:if="${session.esAdmin != null and session.esAdmin}">
                                <a class="nav-link" th:href="@{/usuario/listado}">
                                    <i class="fa-solid fa-users"></i> Usuarios
                                </a>
                            </li>
                            <li class="nav-item" th:if="${session.esAdmin != null and session.esAdmin}">
                                <a class="nav-link" th:href="@{/rol/listado}">
                                    <i class="fa-solid fa-id-badge"></i> Roles
                                </a>
                            </li>
                            <li class="nav-item" th:if="${session.esAdmin != null and session.esAdmin}">
                                <a class="nav-link" th:href="@{/usuario_rol/mantenimiento}">
                                    <i class="fa-solid fa-user-shield"></i> Permisos
                                </a>
                            </li>
                        </ul>
                        <ul class="navbar-nav">
                            <li class="nav-item" th:if="${session.usuarioLogueado == null}">
                                <a class="nav-link btn btn-outline-light btn-sm px-3" th:href="@{/login}">Iniciar Sesión</a>
                            </li>
                            <li class="nav-item" th:if="${session.usuarioLogueado != null}">
                                <a class="nav-link" th:href="@{/solicitud/listado}">
                                    <i class="fa-solid fa-paper-plane"></i> Solicitudes
                                </a>
                            </li>
                            <li class="nav-item" th:if="${session.usuarioLogueado != null}">
                                <a class="nav-link text-warning fw-bold" th:href="@{/logout}">
                                    <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión ([[${session.usuarioLogueado.username}]])
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <!-- Fragmento para mostrar notificaciones Toast -->
        <section th:fragment="mostrarToast">
            <div aria-live="polite" aria-atomic="true" class="position-fixed top-50 start-50 translate-middle" style="z-index: 1080;">

                <!-- Toast de Error -->
                <div th:if="${error}" class="toast show" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true">
                    <div class="toast-header text-white bg-danger">
                        <i class="fa-solid fa-bomb"></i> <strong class="me-auto"> [[${error}]]</strong>
                    </div>
                    <div class="toast-body">
                        <p>[[${error}]]</p>
                        <div class="mt-2 pt-2 border-top text-center">
                            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="toast">[[#{accion.cerrar}]]</button>
                        </div>
                    </div>
                </div>

                <!-- Toast de Éxito  -->
                <div th:if="${todoOk}" class="toast show" role="status" aria-live="polite" aria-atomic="true" data-bs-autohide="true">
                    <div class="toast-header text-white bg-success">
                        <i class="fa-solid fa-square-check"></i> <strong class="me-auto"> Éxito</strong>
                    </div>
                    <div class="toast-body">
                        <p>[[${todoOk}]]</p>
                        <div class="mt-2 pt-2 border-top text-center">
                            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="toast">[[#{accion.cerrar}]]</button>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- Fragmento del Footer -->
        <footer th:fragment="footer" class="bg-dark text-white mt-5 p-4 text-center">
            <div class="container">
                <p>2026 Autos Caribe. Todos los derechos reservados.</p>
            </div>
        </footer>

    </body>
</html>
