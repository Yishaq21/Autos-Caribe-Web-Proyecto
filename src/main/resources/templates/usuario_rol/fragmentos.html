<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <body>
        <section th:fragment="asignacion" class="py-4 mb-4 bg-light">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 mx-auto">
                        
                        <!-- TARJETA 1: Combo Box clásico con botón de buscar -->
                        <div class="card mb-4">
                            <div class="card-header bg-primary text-white">
                                <h4><i class="fas fa-users-cog"></i> [[#{plantilla.permisos}]]</h4>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/usuario_rol/consultar}" method="POST">
                                    <div class="mb-3">
                                        <label for="idUsuario" class="form-label">Usuario:</label>
                                        <select class="form-select" name="idUsuario" id="idUsuario" required="true">
                                            <option value="" disabled="true" th:selected="${usuarioSeleccionado == null}">-- Seleccione un usuario --</option>
                                            <option th:each="u : ${usuarios}" 
                                                    th:value="${u.idUsuario}" 
                                                    th:text="${u.nombre + ' ' + u.apellidos}"
                                                    th:selected="${usuarioSeleccionado != null and usuarioSeleccionado.idUsuario == u.idUsuario}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-4">
                                            <button type="submit" class="btn btn-primary">
                                                <i class="fas fa-search"></i> Buscar Roles
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <!-- TARJETA 2: Checkboxes cuadrados clásicos -->
                        <div class="card" th:if="${usuarioSeleccionado != null}">
                            <div class="card-header bg-success text-white">
                                <h4><i class="fas fa-user-shield"></i> Roles del Usuario: [[${usuarioSeleccionado.nombre}]]</h4>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/usuario_rol/guardar}" method="POST">
                                    <input type="hidden" name="idUsuario" th:value="${usuarioSeleccionado.idUsuario}" />
                                    
                                    <div class="mb-3">
                                        <div class="form-check" th:each="rol : ${rolesDisponibles}">
                                            <input class="form-check-input" type="checkbox" 
                                                   name="idRoles" 
                                                   th:value="${rol.idRol}" 
                                                   th:id="${'rol_' + rol.idRol}"
                                                   th:checked="${usuarioSeleccionado.roles.contains(rol)}" />
                                            <label class="form-check-label" th:for="${'rol_' + rol.idRol}">
                                                [[${rol.nombre}]]
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <div class="row">
                                        <div class="col-md-4">
                                            <button type="submit" class="btn btn-success">
                                                <i class="fas fa-save"></i> Guardar
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
