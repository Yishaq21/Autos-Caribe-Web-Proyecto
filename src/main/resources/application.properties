spring.application.name=autoscaribe
server.port=80
spring.main.banner-mode=off
spring.thymeleaf.cache=false

# Conexión a MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/autoscaribe_db
spring.datasource.username=root
spring.datasource.password=Martillo21
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Para ver el SQL generado por Hibernate en consola (útil para depurar)
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG

# Para que Hibernate cree/actualice las tablas automáticamente por ahora
spring.jpa.hibernate.ddl-auto=update